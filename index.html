<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Track</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Job Track</h1>
      <p>Let's hit the job search running</p>
    </header>

    <dialog id="login-modal">
      <form id="login-form">
        <h2>Login</h2>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required />
        <button type="submit" id="login-button" class="btn">Login</button>
      </form>
    </dialog>

    <dialog id="create-job-modal">
      <form id="create-job-form">
        <h2>Create Job</h2>
        <label for="position">Position:</label>
        <input type="text" id="position" name="position" required />
        <label for="company">Company:</label>
        <input type="text" id="company" name="company" required />
        <label for="notes">Notes:</label>
        <textarea id="notes" name="notes"></textarea>
        <label for="salary">Salary:</label>
        <input type="number" id="salary" name="salary" step="1000" />
        <button type="submit" id="create-job-button" class="btn">
          Create Job
        </button>
      </form>
    </dialog>

    <section id="welcome-section">
      <h3 id="welcome-message"></h3>
      <form id="logout-form">
        <button type="submit" id="logout-button" class="btn">Logout</button>
      </form>
    </section>

    <section id="job-board">
      <table>
        <thead>
          <tr>
            <th>
              <p>Wishlist</p>
              <button class="btn table-column" data-column="wishlist">+</button>
            </th>
            <th>
              <p>Applied</p>
              <button class="btn table-column" data-column="applied">+</button>
            </th>
            <th>
              <p>Interviewing</p>
              <button class="btn table-column" data-column="interviewing">
                +
              </button>
            </th>
            <th>
              <p>Offer</p>
              <button class="btn table-column" data-column="offer">+</button>
            </th>
            <th>
              <p>Rejected</p>
              <button class="btn table-column" data-column="rejected">+</button>
            </th>
          </tr>
        </thead>
        <tbody id="job-board-body"></tbody>
      </table>
    </section>
  </body>
  <script src="./js/index.js" type="module"></script>
  <!-- Must be served from a server to work, so use Live Server or similar -->
</html>
